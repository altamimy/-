<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> أهلاً بك في موقعي الجميل 🌸</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #252545);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .welcome-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            animation: fadeIn 1.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .avatar {
            font-size: 60px;
            margin-bottom: 10px;
            display: inline-block;
            animation: wave 2s infinite;
            transform-origin: 70% 70%;
        }
        @keyframes wave {
            0% { transform: rotate( 0.0deg) }
            10% { transform: rotate(14.0deg) }
            20% { transform: rotate(-8.0deg) }
            30% { transform: rotate(14.0deg) }
            40% { transform: rotate(-4.0deg) }
            50% { transform: rotate(10.0deg) }
            60% { transform: rotate( 0.0deg) }
            100% { transform: rotate( 0.0deg) }
        }
        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            background: linear-gradient(to left, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #e0e0e0;
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: #1e1e2f;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="avatar">👋</div>
        <h1>أهلاً ومرحباً بك!</h1>
        <p>يسعدني جداً زيارتك لصفحتي المتواضعة. هذه عباره عن صحه ترحيبه معرفة بقية التفاصيل يرجى التوجه الى حسابي في ال GitHub </p>
        <a href="https://github.com/altamimy" target="_blank" class="btn">تصفّح مشاريعي الأخرى 🚀</a>
    </div>

</body>
</html>
